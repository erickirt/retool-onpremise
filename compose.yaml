# Comment out the below 'include' block to use Retool-managed Temporal (Enterprise license)
include:
  - temporal.yaml

services:
  api:
    build:
      context: .
    env_file: docker.env
    environment:
      - SERVICE_TYPE=MAIN_BACKEND,DB_CONNECTOR,DB_SSH_CONNECTOR
    ports:
      - 3000:3000
    networks:
      - frontend
      - backend
      - code-executor
      - js-executor
    depends_on:
      - postgres
      - minio
    restart: always

  jobs-runner:
    build:
      context: .
    env_file: docker.env
    environment:
      - SERVICE_TYPE=JOBS_RUNNER
    networks:
      - backend
    depends_on:
      - postgres
    restart: always

  workflows-backend:
    build:
      context: .
    env_file: docker.env
    environment:
      - SERVICE_TYPE=WORKFLOW_BACKEND,DB_CONNECTOR,DB_SSH_CONNECTOR
    networks:
      - backend
      - code-executor
      - js-executor
    depends_on:
      - postgres
    restart: always

  workflows-worker:
    build:
      context: .
    env_file: docker.env
    environment:
      - SERVICE_TYPE=WORKFLOW_TEMPORAL_WORKER
      - NODE_OPTIONS=--max_old_space_size=1024
    networks:
      - backend
      - code-executor
      - js-executor
    depends_on:
      - postgres
    restart: always

  agent-worker:
    build:
      context: .
    env_file: docker.env
    environment:
      - SERVICE_TYPE=WORKFLOW_TEMPORAL_WORKER
      - WORKER_TEMPORAL_TASKQUEUE=agent
    networks:
      - backend
      - code-executor
      - js-executor
    depends_on:
      - postgres
    restart: always

  agent-eval-worker:
    build:
      context: .
    env_file: docker.env
    environment:
      - SERVICE_TYPE=AGENT_EVAL_TEMPORAL_WORKER
      - WORKER_TEMPORAL_TASKQUEUE=agent-eval
    networks:
      - backend
      - code-executor
      - js-executor
    depends_on:
      - postgres
    restart: always

  code-executor:
    build:
      context: .
      target: code-executor
    
    # Option 1 (preferred): Run privileged to sandbox user code in Workflows
    privileged: true

    # Option 2: Run unprivileged, potentially required with your host machine permissions
    # user: retool_user
    # environment:
    #   - ALLOW_UNSAFE_CODE_EXECUTION=true

    networks:
      - code-executor
    restart: always

  js-executor:
    build:
      context: .
      target: js-executor

    # js-executor reads its memory budget from the cgroup limit, so this
    # must be set explicitly. Matches the helm chart default (2048Mi).
    mem_limit: 4g

    # Custom seccomp profile is required for nsjail's syscalls to pass Docker's
    # default seccomp filter. Applies under both options below.
    security_opt:
      - seccomp=./nsjail-seccomp.json

    # Option 1 (preferred): Grant NET_ADMIN so the executor can install
    # iptables egress rules. Requires the host kernel to expose the
    # netfilter `filter` table.
    cap_add:
      - NET_ADMIN

    # Option 2: Skip iptables-based egress filtering. Use this if NET_ADMIN
    # isn't available or the host kernel lacks netfilter support. nsjail still
    # wraps user code; only the network-egress filter is skipped. Note: do
    # not also drop to a non-root user here — the entrypoint uses `runuser`
    # internally to drop privileges and that requires starting as root.
    # environment:
    #   - DISABLE_IPTABLES_SECURITY_CONFIGURATION=true

    networks:
      - js-executor
    restart: always
  
  agent-sandbox-controller:
    build:
      context: .
      target: agent-sandbox
    user: root
    env_file: docker.env
    environment:
      - NODE_ENV=production
      - AGENT_EXECUTOR_ROLE=controller
      - ORCHESTRATOR=docker
      - EXECUTOR_IMAGE=${EXECUTOR_IMAGE:-retool-onpremise-agent-sandbox-controller}
      - DOCKER_NETWORK=agent-sandbox
      - EXECUTOR_SERVICE_NAME=agent-sandbox
      - SANDBOX_BACKEND_URL=http://api:3000
      - EXECUTOR_EXTRA_ENV=SANDBOX_NETWORK_ENABLED=false,SANDBOX_HTTP_PROXY=http://agent-sandbox-proxy:3019
      - EXECUTOR_SECCOMP_PROFILE_PATH=/seccomp/gvisor-seccomp.json
      # Lower pool sizes for local development
      - PREWARM_POOL_SIZE=1
      - MAX_TOTAL_JOBS=10
      - MAX_CONCURRENT_CREATES=2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gvisor-seccomp.json:/seccomp/gvisor-seccomp.json:ro
    networks:
      - backend
      - agent-sandbox
    depends_on:
      - postgres
    restart: always
  
  agent-sandbox-proxy:
    build:
      context: .
      target: agent-sandbox
    env_file: docker.env
    environment:
      - NODE_ENV=production
      - AGENT_EXECUTOR_ROLE=proxy
      - ORCHESTRATOR=docker
      - PROXY_PORT=3019
      - EXECUTOR_SERVICE_NAME=agent-sandbox
      - BACKEND_URL=http://api:3000
      # Uncomment to restrict which external domains sandboxes can reach
      # - ALLOWED_DOMAINS=api.openai.com,api.anthropic.com
    ports:
      - 3019:3019
    networks:
      - backend
      - agent-sandbox
    depends_on:
      - postgres
    restart: always
  
  r2-agent-worker:
    build:
      context: .
    env_file: docker.env
    environment:
      - SERVICE_TYPE=R2_AGENT_TEMPORAL_WORKER
      - WORKER_TEMPORAL_TASKQUEUE=r2-agent
    networks:
      - backend
      - code-executor
      - js-executor
      - agent-sandbox
    depends_on:
      - postgres
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=retool
      - MINIO_ROOT_PASSWORD=retoolminio
      - MINIO_DOMAIN=minio
    ports:
      - 9000:9000
      - 9001:9001
    networks:
      backend:
        aliases:
          - retool-blob-storage.minio
          - retool-rr-git.minio
          - retool-rr-snapshots.minio
    volumes:
      - minio-data:/data
    restart: always

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 retool retoolminio;
      mc mb --ignore-existing local/retool-blob-storage;
      mc mb --ignore-existing local/retool-rr-git;
      mc mb --ignore-existing local/retool-rr-snapshots;
      echo 'Buckets created successfully';
      "
    networks:
      - backend

  # Retool's internal DB, we recommend using an externally hosted database: https://docs.retool.com/docs/configuring-retools-storage-database
  postgres:
    image: postgres:16.8
    env_file: docker.env
    command: -c 'max_connections=200'
    networks:
      - backend
    volumes:
      - data:/var/lib/postgresql/data
    restart: always
  
  retooldb-postgres:
    image: postgres:16.8
    env_file: retooldb.env
    networks:
      - backend
    volumes:
      - retooldb-data:/var/lib/postgresql/data
    restart: always

  # Optional Nginx container for handling TLS for your domain (requires setting DOMAINS and STAGE)
  https-portal:
    image: tryretool/https-portal:latest
    env_file: docker.env
    environment:
      # Change 'local' -> 'production' below once your domain is pointing to this server
      STAGE: local 
      CLIENT_MAX_BODY_SIZE: 40M
      KEEPALIVE_TIMEOUT: 605
      PROXY_CONNECT_TIMEOUT: 600
      PROXY_SEND_TIMEOUT: 600
      PROXY_READ_TIMEOUT: 600
    ports:
      - 80:80
      - 443:443
    networks:
      - frontend
    restart: always

networks:
  frontend:
  backend:
  code-executor:
  js-executor:
  agent-sandbox:
    name: agent-sandbox

volumes:
  data:
  retooldb-data:
  minio-data:
